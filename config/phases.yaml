# Phase boundaries are HYPOTHESES to verify against the data, not constants.
# All dates are UTC, ISO 8601. Revise here; nothing is hard-coded elsewhere.

study_period:
  start: "2025-05-01T00:00:00Z"   # baseline before the June 2025 war blackouts
  end: "2026-07-01T00:00:00Z"

phases:
  # D-025: boundaries below are data-derived (blind full-period scan of the
  # country-level IODA probing signal against D-013's already-decided dark
  # ratio), not press-reported priors. See DECISIONS.md D-025 for method and
  # the disconfirming note on P0/P1 (no transition detected at the press-
  # reported Dec 20 2025 date - the scan found a distinct event starting
  # Jan 8 2026 instead).
  P0:
    start: "2025-05-01T00:00:00Z"
    end: "2026-01-08T16:50:00Z"
    character: "baseline + June 2025 war blackouts as short-shutdown reference. No measurable transition found at the press-reported late-Dec-2025 throttling-onset date."
  P1:
    start: "2026-01-08T16:50:00Z"
    end: "2026-02-28T07:50:00Z"
    character: "internally heterogeneous (D-025): an 18-day near-total dark event (Jan 8-27, control-validated, 123 ASNs incl. TCI/TIC/MCI/Irancell/Rightel) followed by a ~32-day return to baseline before the hard onset. Report the Jan event separately, not as a P1-wide average."
  P2:
    start: "2026-02-28T07:50:00Z"
    end: "2026-03-01T00:00:00Z"
    character: "hard blackout onset, connectivity ~1%. Country probing signal crosses dark at 07:50 UTC, ~1h12m before the 09:02 UTC BGP withdrawal wave."
  P3:
    start: "2026-03-01T00:00:00Z"
    end: "2026-05-26T12:10:00Z"
    character: "plateau"
  P4:
    start: "2026-05-26T12:10:00Z"
    end: "2026-07-01T00:00:00Z"
    character: "partial, tiered restoration (whitelist regime)"

# Boundary windows: full BGP update streams are pulled only here (Stage 2),
# and event_speed metrics (H4) are computed per window.
event_windows:
  nov2019:
    start: "2019-11-16T00:00:00Z"
    end: "2019-11-23T00:00:00Z"
  jun2025:
    start: "2025-06-11T00:00:00Z"
    end: "2025-06-26T00:00:00Z"
  feb2026_onset:
    start: "2026-02-27T00:00:00Z"
    end: "2026-03-01T00:00:00Z"
  may2026_restoration:
    start: "2026-05-24T00:00:00Z"
    end: "2026-05-27T00:00:00Z"
  # D-025: the newly-found Jan 2026 dark event (P1). Not yet pulled - queued
  # behind jun2025 intentionally (no concurrent heavy collection jobs on the
  # same EC2 host, per the 2026-07-06 OOM incident). A day of margin on each
  # side of the measured 01-08T16:50Z -> 01-27T01:00Z window.
  jan2026_event:
    start: "2026-01-07T00:00:00Z"
    end: "2026-01-28T00:00:00Z"

# Milestone-1 test week around the P2 boundary; used by `make test-week`.
test_week:
  start: "2026-02-25T00:00:00Z"
  end: "2026-03-03T00:00:00Z"

bgp:
  collectors: ["rrc00", "rrc12", "route-views2", "route-views.linx"]
  # D-002: RIB/visibility runs use only collectors with continuous BGPStream-broker
  # RIB coverage for the analyzed window (broker serves no rrc00 bviews Dec 2025-Mar 2026,
  # no rrc12 before 2026-03-01). Temporary for milestone 1; see D-002 condition before
  # any full-period run. `collectors` above still governs update-stream event pulls.
  rib_collectors: ["route-views2", "route-views.linx"]
  rib_interval_hours: 8
  # D-012: RIS backfill — direct bview fetch from data.ris.ripe.net (broker bypass).
  # Produces the SECONDARY RIS-inclusive series (data/bgp/ribs_ris/); never mixed with
  # the primary series in one comparison. Ranges chosen by phase structure.
  ris_backfill:
    collectors: ["rrc00", "rrc12"]
    ranges:
      p2_onset: { start: "2026-02-25T00:00:00Z", end: "2026-03-03T00:00:00Z" }
      p4_restoration: { start: "2026-05-24T00:00:00Z", end: "2026-07-01T00:00:00Z" }
      p0_baseline: { start: "2025-09-01T00:00:00Z", end: "2025-10-01T00:00:00Z" }
      # D-015: P3 plateau sample slices (calendar rule: 14th->21st of each full P3 month)
      p3_sample_mar: { start: "2026-03-14T00:00:00Z", end: "2026-03-21T00:00:00Z" }
      p3_sample_apr: { start: "2026-04-14T00:00:00Z", end: "2026-04-21T00:00:00Z" }
      p3_sample_may: { start: "2026-05-14T00:00:00Z", end: "2026-05-21T00:00:00Z" }
  # A peer counts as "full feed" if its RIB carries at least this many prefixes.
  full_feed_min_prefixes:
    ipv4: 400000
    ipv6: 50000

ioda:
  # merit-nt = darknet (the UCSD telescope datasource `ucsd-nt` was retired)
  signals: ["bgp", "ping-slash24", "merit-nt"]
  request_interval_seconds: 1.0
  # API rejects single queries >~100 days; 90-day chunks verified to return
  # native step (no downsampling), 2026-07-06
  max_query_days: 90

# ASNs cross-checked against RIPEstat (Stage 4). Initial candidates are the
# gateway ASes (TIC 49666, DCI 12880) plus major access networks; revise the
# sample after Stage 1 classification.
ripestat_sample_asns: [49666, 12880, 58224, 197207, 44244]

analysis:
  # D-013: thresholds are PROVISIONAL pipeline values. Paper-grade values come from
  # the D-013 procedure (literature precedent -> P0 bimodality valley -> control-
  # population calibration). No H1 number computed with these is reportable.
  visibility_announced_min: 0.5   # visibility fraction >= this => announced
  probing_dark_ratio: 0.2         # probing below this fraction of baseline => dark
  # D-013 (D-005): fixed P0 reference window for per-AS probing baselines
  # (median over window), and the adequacy rule for probing-based metrics.
  probing_baseline_window: { start: "2025-09-01T00:00:00Z", end: "2025-10-01T00:00:00Z" }
  probing_adequacy: { min_nonzero_share: 0.5, min_median: 5 }
  # D-020: a (snapshot, family) cell with fewer full-feed peers than this is
  # DEGRADED and excluded from visibility-based analyses for that family.
  min_fullfeed_peers: 15
  # D-023: restoration timestamp = first post-P4 crossing of
  # restoration_primary_threshold (50%) of a delegated block's own P0
  # baseline mean (address-space-weighted, D-022); the other two values are
  # pre-committed 25%/80% robustness companions, computed alongside, never
  # substituted for the primary.
  restoration_thresholds: [0.25, 0.5, 0.8]
  restoration_primary_threshold: 0.5
  # D-023: steady-state completeness = mean visibility over the final N days
  # of the study period (a separate question from restoration timing).
  steady_state_days: 30
  # D-009: a withdrawal is a flap (not a real onset event for H4) if the same
  # peer session (prefix, origin asn, peer_asn) reannounces within this many
  # seconds. Derived from the actual withdraw->reannounce gap distribution
  # across all completed event windows (12.77M gaps) - see DECISIONS.md D-009
  # for the full histogram/rationale. 30s/300s are pre-committed robustness
  # companions, not substitutes for the primary.
  flap_threshold_s: 60
  flap_threshold_robustness_s: [30, 300]
